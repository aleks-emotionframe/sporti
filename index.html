<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Sporti – Dein Sportverein. Deine App.</title>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
*{font-family:'Outfit',sans-serif;-webkit-tap-highlight-color:transparent}
html{height:100%;background:#000}
body{height:100%;background:#06080f;color:#fff;overflow-x:hidden;display:flex;justify-content:center}
#root{width:100%;max-width:390px;min-height:100%;position:relative;background:#06080f;overflow-x:hidden}
::-webkit-scrollbar{width:0;display:none}
@media(min-width:500px){body{background:#111;align-items:center;padding:20px 0}#root{min-height:calc(100vh - 40px);max-height:calc(100vh - 40px);overflow-y:auto;border-radius:32px;border:2px solid rgba(255,255,255,.08);box-shadow:0 0 80px rgba(0,0,0,.5)}}
@keyframes aurora{0%,100%{transform:translate(0,0) rotate(0) scale(1)}33%{transform:translate(20px,-15px) rotate(3deg) scale(1.05)}66%{transform:translate(-15px,10px) rotate(-2deg) scale(.97)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes pulse-ring{0%{transform:scale(.97);opacity:.8}50%{transform:scale(1.03);opacity:1}100%{transform:scale(.97);opacity:.8}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{opacity:.4}50%{opacity:.8}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.anim{animation:slideUp .4s ease-out both}.d1{animation-delay:.04s}.d2{animation-delay:.08s}.d3{animation-delay:.12s}.d4{animation-delay:.16s}.d5{animation-delay:.2s}
.glass{background:rgba(255,255,255,.03);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.06);transition:all .15s}
.glass-s{background:rgba(255,255,255,.06);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.1)}
.gt{background:linear-gradient(135deg,#a3f7bf,#00d4ff,#7c5cfc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gt-w{background:linear-gradient(135deg,#ffd700,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ag{background:linear-gradient(135deg,#a3f7bf,#00d4ff,#7c5cfc)}.aglow{box-shadow:0 0 20px rgba(0,212,255,.12),0 0 40px rgba(163,247,191,.06)}
input,select{font-family:'Outfit',sans-serif;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px 12px;color:#fff;font-size:13px;outline:none;transition:border-color .2s;width:100%}
input::placeholder{color:rgba(255,255,255,.12)}input:focus,select:focus{border-color:rgba(0,212,255,.3)}select{appearance:none;color:rgba(255,255,255,.5)}
.btn{width:100%;padding:13px;border-radius:12px;font-weight:700;font-size:13px;color:#06080f;border:none;cursor:pointer;transition:all .12s}.btn:active{transform:scale(.97)}
.aurora-orb{position:absolute;border-radius:50%;pointer-events:none}.dot-grid{background-image:radial-gradient(rgba(255,255,255,.02) 1px,transparent 1px);background-size:20px 20px}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;z-index:50;padding:0 0 env(safe-area-inset-bottom,0)}
.nav-inner{display:flex;justify-content:space-around;padding:8px 0 10px;background:rgba(6,8,15,.94);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-top:1px solid rgba(255,255,255,.04)}
@media(min-width:500px){.nav{bottom:20px;border-radius:0 0 30px 30px;overflow:hidden}}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:2px 10px;background:none;border:none;cursor:pointer;position:relative}
.nav-dot{position:absolute;top:-4px;width:16px;height:2px;border-radius:2px}
.badge{padding:2px 7px;border-radius:6px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}.ring-content{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.card{border-radius:14px;padding:12px}.screen{animation:fadeIn .25s ease-out}.mono{font-family:'JetBrains Mono',monospace}
.section{margin-bottom:20px}
.section-title{font-size:10px;font-weight:700;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.18em;margin-bottom:10px}
.label{display:block;color:rgba(255,255,255,.25);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;margin-bottom:6px}
</style>
</head>

const Av=({name,size=32,glow,ring})=>{const i=name.split(" ").map(n=>n[0]).join("");return<div className={glow?"aglow":""} style={{width:size,height:size,borderRadius:size>40?14:10,background:"linear-gradient(135deg,rgba(163,247,191,.15),rgba(0,212,255,.15),rgba(124,92,252,.15))",border:ring?"2px solid rgba(0,212,255,.3)":"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontWeight:700,color:"rgba(255,255,255,.7)",fontSize:size*.3}}>{i}</span></div>};

  <div className="anim d4" style={{marginTop:20}}>

th:34,height:34,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic n={a.i} s={15} c="rgba(255,255,255,.35)"/></div><div style={{flex:1}}><div style={{fontSize:13,color:"rgba(255,255,255,.7)",fontWeight:500}}>{a.l}</div><div style={{fontSize:9,color:"rgba(255,255,255,.2)",fontWeight:300}}>{a.d}</div></div><span style={{color:"rgba(255,255,255,.1)",fontSize:16}}>›</span></div>)}</div></div>};

const Members=()=><div className="screen" style={{padding:`0 ${px}px 20px`}}><div className="anim" style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}><div><h2 style={{fontSize:20,fontWeight:800}}>Mitglieder</h2><p style={{fontSize:11,color:"rgba(255,255,255,.25)",fontWeight:300,marginTop:2}}>{mems.length} Mitglieder</p></div><button className="ag aglow" style={{width:34,height:34,borderRadius:10,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="plus" s={15} c="#06080f"/></button></div><input placeholder="Suchen..." style={{marginBottom:14}} className="anim d1"/><div style={{display:"flex",flexDirection:"column",gap:6}}>{mems.map((m,i)=><div key={m.id} className={`glass card anim d${Math.min(i+1,5)}`} style={{display:"flex",alignItems:"center",gap:10,padding:10}}><Av name={m.n} size={34}/><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,color:"rgba(255,255,255,.75)",fontWeight:500}}>{m.n}</div><div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}><Bdg type={m.rl.includes("Trainer")?"turnier":m.rl.includes("Eltern")?"helfer":"training"}>{m.rl}</Bdg>{m.tm!=="–"&&<span style={{fontSize:8,color:"rgba(255,255,255,.2)"}}>{m.tm}</span>}</div></div>{m.par&&<span style={{fontSize:8,color:"rgba(255,255,255,.15)",fontWeight:300,textAlign:"right",lineHeight:1.4}}>Eltern<br/><span style={{color:"rgba(255,255,255,.25)"}}>{m.par}</span></span>}{m.child&&<span style={{fontSize:8,color:"rgba(255,255,255,.15)",fontWeight:300,textAlign:"right",lineHeight:1.4}}>Kind<br/><span style={{color:"rgba(255,255,255,.25)"}}>{m.child}</span></span>}</div>)}</div></div>;

const Profile=({onBack})=><div className="screen" style={{padding:`0 ${px}px 20px`}}><Back onClick={onBack}/><div className="anim section" style={{display:"flex",flexDirection:"column",alignItems:"center",textAlign:"center"}}><div style={{position:"relative",marginBottom:14}}><div className="ag aglow" style={{width:84,height:84,borderRadius:22,display:"flex",alignItems:"center",justifyContent:"center",animation:"pulse-ring 4s ease-in-out infinite"}}><span style={{fontSize:26,fontWeight:900,color:"#06080f"}}>LM</span></div><div className="glass-s" style={{position:"absolute",bottom:-2,right:-2,width:28,height:28,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:12}}>📷</div></div><h2 style={{fontSize:20,fontWeight:800,marginBottom:2}}>{U.name}</h2><p style={{fontSize:12,color:"rgba(255,255,255,.3)",fontWeight:300}}>{U.team} · {U.role}</p></div><div className="anim d1 section" style={{display:"flex",flexDirection:"column",gap:6}}>{[{l:"E-Mail",v:"luca@example.ch"},{l:"Geburtsdatum",v:"15.06.2008"},{l:"Eltern-Account",v:"Thomas Meier (verknüpft)"},{l:"Mitglied seit",v:"August 2021"}].map(f=><div key={f.l} className="glass card" style={{padding:12}}><div style={{fontSize:9,color:"rgba(255,255,255,.25)",fontWeight:700,textTransform:"uppercase",letterSpacing:".12em",marginBottom:2}}>{f.l}</div><div style={{fontSize:13,color:"rgba(255,255,255,.7)",fontWeight:500}}>{f.v}</div></div>)}</div><div className="anim d2 section"><h3 className="section-title">Abwesenheiten</h3><div style={{borderRadius:14,padding:12,background:"rgba(255,215,0,.04)",border:"1px solid rgba(255,215,0,.1)"}}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}><Ic n="injury" s={13} c="#ffd700"/><span style={{fontSize:13,color:"#ffd700",fontWeight:500}}>Knöchelverletzung</span></div><div style={{fontSize:10,color:"rgba(255,255,255,.25)",fontWeight:300}}>Rückkehr: ca. 15. April 2026</div></div></div><button className="glass anim d3" style={{width:"100%",padding:12,borderRadius:12,color:"rgba(255,255,255,.3)",fontSize:12,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center",gap:6,cursor:"pointer",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)"}}><Ic n="logout" s={14}/> Abmelden</button></div>;

const Nav=({active,nav,role})=>{const isStaff=role==="trainer"||role==="vorstand"||role==="admin";const items=[{id:"dashboard",ic:"home",l:"Home"},{id:"events",ic:"calendar",l:"Termine"},isStaff?{id:"rankings",ic:"trophy",l:"Ranking"}:{id:"helpers",ic:"hand",l:"Helfer"},{id:"chat",ic:"chat",l:"Chat"}];items.push(isStaff?{id:"admin",ic:"settings",l:"Admin"}:{id:"profile",ic:"profile",l:"Profil"});return<div className="nav"><div className="nav-inner">{items.map(it=>{const a=active===it.id;return<button key={it.id} onClick={()=>nav(it.id)} className="nav-btn">{a&&<div className="nav-dot ag"/>}<Ic n={it.ic} s={18} c={a?"#00d4ff":"rgba(255,255,255,.2)"}/><span style={{fontSize:8,fontWeight:700,letterSpacing:".04em",color:a?"#00d4ff":"rgba(255,255,255,.2)"}}>{it.l}</span></button>})}</div></div>};

const App=()=>{const[scr,setScr]=useState("login");const[role,setRole]=useState("spieler");const[evD,setEvD]=useState(null);const[prev,setPrev]=useState("dashboard");const nav=(t,d)=>{if(t==="eventDetail"){setEvD(d);setPrev(scr)}setScr(t);document.getElementById("root").scrollTop=0;window.scrollTo?.(0,0)};
if(scr==="login")return<Login onLogin={r=>{setRole(r);setScr("dashboard")}}/>;
const S={dashboard:<Dash role={role} nav={nav}/>,events:<Events nav={nav}/>,eventDetail:<EvDetail ev={evD} onBack={()=>setScr(prev)}/>,createEvent:<CreateEv onBack={()=>setScr("dashboard")}/>,rankings:<Rankings/>,chat:<Chat/>,helpers:<Helpers/>,finances:<Finances/>,admin:<Admin nav={nav}/>,members:<Members/>,profile:<Profile onBack={()=>setScr("dashboard")}/>};

return<div className="dot-grid" style={{position:"relative",minHeight:"100%"}}><Aurora/>
  <div style={{height:"env(safe-area-inset-top, 14px)",minHeight:14}}/>

  <div style={{height:1,background:"rgba(255,255,255,.04)",margin:"12px 16px 18px"}}/>
  <div style={{paddingBottom:72}}>{S[scr]||<Dash role={role} nav={nav}/>}</div>
  <Nav active={mains.includes(scr)?scr:prev} nav={nav} role={role}/>
</div>};
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
