*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

html{height:100%;background:#000}
body{height:100%;background:#06080f;color:#fff;overflow-x:hidden;display:flex;justify-content:center}

@keyframes borderGlow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.moti-card{border:none!important;isolation:isolate}
.moti-border{position:absolute;inset:0;border-radius:18px;padding:2px;background:linear-gradient(135deg,var(--c1),var(--c2),var(--c3),var(--c1));background-size:400% 400%;animation:borderGlow 3s linear infinite;pointer-events:none}.moti-border::after{content:'';position:absolute;inset:2px;border-radius:16px;background:#06080f}

@keyframes aurora{0%,100%{transform:translate(0,0) rotate(0) scale(1)}33%{transform:translate(20px,-15px) rotate(3deg) scale(1.05)}66%{transform:translate(-15px,10px) rotate(-2deg) scale(.97)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes pulse-ring{0%{transform:scale(.97);opacity:.8}50%{transform:scale(1.03);opacity:1}100%{transform:scale(.97);opacity:.8}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{opacity:.4}50%{opacity:.8}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.anim{animation:slideUp .4s ease-out both}.d1{animation-delay:.04s}.d2{animation-delay:.08s}.d3{animation-delay:.12s}.d4{animation-delay:.16s}.d5{animation-delay:.2s}

.glass{background:var(--glass);backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));border:1px solid var(--glass-border);border-radius:16px;transition:all .15s;box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 2px 12px rgba(0,0,0,.1)}
.glass-s{background:var(--glass-s);backdrop-filter:blur(var(--blur-s));-webkit-backdrop-filter:blur(var(--blur-s));border:1px solid var(--glass-border-s);border-radius:16px}
.glass-header{background:rgba(6,8,15,.55);backdrop-filter:blur(var(--blur-s));-webkit-backdrop-filter:blur(var(--blur-s));border-bottom:1px solid var(--glass-border);box-shadow:0 4px 20px rgba(0,0,0,.15)}

.gt{background:linear-gradient(135deg,var(--c1),var(--c2),var(--c3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gt-w{background:linear-gradient(135deg,#ffd700,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ag{background:linear-gradient(135deg,var(--c1),var(--c2),var(--c3))}.aglow{box-shadow:0 0 20px rgba(var(--c2r),.15),0 0 40px rgba(var(--c1r),.08)}

input,select,textarea{font-family:'Outfit',sans-serif;background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:14px;padding:12px 14px;color:#fff;font-size:13px;outline:none;transition:all .2s;width:100%;box-shadow:inset 0 1px 3px rgba(0,0,0,.2)}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,.15)}
input:focus,select:focus,textarea:focus{border-color:rgba(var(--c2r),.35);background:rgba(var(--c2r),.04);box-shadow:0 0 12px rgba(var(--c2r),.06)}
select{appearance:none;color:rgba(255,255,255,.5)}

.btn{width:100%;padding:13px;border-radius:16px;font-weight:700;font-size:13px;color:#06080f;border:none;cursor:pointer;transition:all .12s;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 4px 12px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.15)}.btn:active{transform:scale(.97)}

.aurora-orb{position:absolute;border-radius:50%;pointer-events:none}
.dot-grid{background-image:radial-gradient(rgba(255,255,255,.015) 1px,transparent 1px);background-size:24px 24px}

.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;z-index:50;padding:0 0 env(safe-area-inset-bottom,0)}
.nav-inner{display:flex;justify-content:space-around;align-items:center;padding:8px 12px 14px;background:rgba(6,8,15,.6);backdrop-filter:blur(var(--blur-s));-webkit-backdrop-filter:blur(var(--blur-s));border-top:1px solid rgba(255,255,255,.08);box-shadow:0 -4px 20px rgba(0,0,0,.2)}

.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 14px;background:none;border:none;cursor:pointer;position:relative;border-radius:14px;transition:all .2s}
.nav-btn-active{background:rgba(var(--c2r),.1)}
.nav-dot{display:none}

.badge{padding:3px 9px;border-radius:20px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}.ring-content{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.card{border-radius:18px;padding:12px;background:var(--glass);backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));border:1px solid var(--glass-border);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 4px 16px rgba(0,0,0,.15)}
.screen{animation:fadeIn .25s ease-out}.mono{font-family:'JetBrains Mono',monospace}
.section{margin-bottom:20px}
.section-title{font-size:10px;font-weight:700;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.18em;margin-bottom:10px}
.label{display:block;color:rgba(255,255,255,.25);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;margin-bottom:6px}

const Members=()=>{
const[memberList,setMemberList]=useState([...memsInit]);
const[teamFilter,setTeamFilter]=useState("alle");
const[search,setSearch]=useState("");
const[showCreate,setShowCreate]=useState(false);
const[editMember,setEditMember]=useState(null);
const[deleteMember,setDeleteMember]=useState(null);
const[formName,setFormName]=useState("");
const[formRole,setFormRole]=useState("Mitglied");
const[formTeam,setFormTeam]=useState("");
const[formTeams,setFormTeams]=useState([]);

const openCreate=()=>{setFormName("");setFormRole("Mitglied");setFormTeam("");setFormTeams([]);setShowCreate(true)};
const openEdit=(m)=>{setFormName(m.n);setFormRole(m.rl);setFormTeam(m.teamId||"");setFormTeams(m.teamIds||[]);setEditMember(m)};
const handleCreate=()=>{if(!formName.trim())return;const newId=Math.max(...memberList.map(m=>m.id))+1;const tm=formRole==="Trainer"?(formTeams.length>0?formTeams.map(tid=>teams.find(t=>t.id===tid)?.name||tid).join("/"):"–"):formRole==="Elternteil"?"–":(teams.find(t=>t.id===formTeam)?.name||"–");const newM={id:newId,n:formName.trim(),rl:formRole,tm,teamId:formRole==="Mitglied"?formTeam||null:null,teamIds:formRole==="Trainer"?formTeams:undefined};setMemberList(p=>[...p,newM]);setShowCreate(false)};
const handleEdit=()=>{if(!formName.trim()||!editMember)return;const tm=formRole==="Trainer"?(formTeams.length>0?formTeams.map(tid=>teams.find(t=>t.id===tid)?.name||tid).join("/"):"–"):formRole==="Elternteil"?"–":(teams.find(t=>t.id===formTeam)?.name||"–");setMemberList(p=>p.map(m=>m.id===editMember.id?{...m,n:formName.trim(),rl:formRole,tm,teamId:formRole==="Mitglied"?formTeam||null:null,teamIds:formRole==="Trainer"?formTeams:undefined}:m));setEditMember(null)};
const handleDelete=()=>{if(!deleteMember)return;setMemberList(p=>p.filter(m=>m.id!==deleteMember.id));setDeleteMember(null)};
const toggleFormTeam=(tid)=>{setFormTeams(p=>p.includes(tid)?p.filter(t=>t!==tid):[...p,tid])};

const filtered=memberList.filter(m=>{const matchTeam=teamFilter==="alle"||(m.teamId===teamFilter)||(m.teamIds&&m.teamIds.includes(teamFilter));const matchSearch=!search||m.n.toLowerCase().includes(search.toLowerCase());return matchTeam&&matchSearch});

const popupStyle={position:"fixed",inset:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:20};
const popupBg={position:"absolute",inset:0,background:"rgba(0,0,0,.6)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)"};
const popupBox={position:"relative",width:"100%",maxWidth:340,borderRadius:20,background:"rgba(13,16,23,.75)",backdropFilter:"blur(40px)",WebkitBackdropFilter:"blur(40px)",border:"1px solid rgba(255,255,255,.1)",padding:20,animation:"slideUp .25s ease-out",boxShadow:"0 24px 64px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.08)"};

const MemberForm=({title,btnLabel,onSubmit,onCancel})=><div style={popupStyle} onClick={onCancel}><div style={popupBg}/><div onClick={e=>e.stopPropagation()} style={popupBox}>

<div style={{display:"flex",flexDirection:"column",gap:12}}>
<div><label className="label">Name</label><input value={formName} onChange={e=>setFormName(e.target.value)} placeholder="Vor- und Nachname"/></div>
<div><label className="label">Rolle</label><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4}}>{["Mitglied","Trainer","Elternteil"].map(r=><button key={r} onClick={()=>setFormRole(r)} style={{padding:"8px 0",borderRadius:8,fontSize:9,fontWeight:700,textTransform:"uppercase",cursor:"pointer",background:formRole===r?"rgba(var(--c2r),.1)":"rgba(255,255,255,.03)",border:formRole===r?"1px solid rgba(var(--c2r),.3)":"1px solid rgba(255,255,255,.06)",color:formRole===r?"var(--c2)":"rgba(255,255,255,.25)",transition:"all .12s"}}>{r}</button>)}</div></div>
{formRole==="Mitglied"&&<div><label className="label">Team</label><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{teams.map(t=><button key={t.id} onClick={()=>setFormTeam(t.id)} style={{padding:"6px 10px",borderRadius:8,fontSize:9,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:4,background:formTeam===t.id?`${t.color}18`:"rgba(255,255,255,.03)",border:formTeam===t.id?`1px solid ${t.color}40`:"1px solid rgba(255,255,255,.06)",color:formTeam===t.id?t.color:"rgba(255,255,255,.25)",transition:"all .12s"}}><span style={{width:6,height:6,borderRadius:3,background:t.color,flexShrink:0}}/>{t.name}</button>)}</div></div>}
{formRole==="Trainer"&&<div><label className="label">Teams (Mehrfachauswahl)</label><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{teams.map(t=><button key={t.id} onClick={()=>toggleFormTeam(t.id)} style={{padding:"6px 10px",borderRadius:8,fontSize:9,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:4,background:formTeams.includes(t.id)?`${t.color}18`:"rgba(255,255,255,.03)",border:formTeams.includes(t.id)?`1px solid ${t.color}40`:"1px solid rgba(255,255,255,.06)",color:formTeams.includes(t.id)?t.color:"rgba(255,255,255,.25)",transition:"all .12s"}}><span style={{width:6,height:6,borderRadius:3,background:t.color,flexShrink:0}}/>{t.name}</button>)}</div></div>}
<div style={{display:"flex",gap:8,marginTop:4}}>
<button onClick={onCancel} style={{flex:1,padding:11,borderRadius:12,fontSize:12,fontWeight:600,cursor:"pointer",border:"1px solid rgba(255,255,255,.06)",background:"rgba(255,255,255,.03)",color:"rgba(255,255,255,.3)"}}>Abbrechen</button>
<button onClick={onSubmit} style={{flex:1,padding:11,borderRadius:12,fontSize:12,fontWeight:700,cursor:"pointer",border:"none",background:formName.trim()?"linear-gradient(135deg,var(--c1),var(--c2))":"rgba(255,255,255,.04)",color:formName.trim()?"#06080f":"rgba(255,255,255,.15)",transition:"all .15s"}}>{btnLabel}</button>
</div></div></div></div>;

return<div className="screen" style={{padding:`0 ${px}px 20px`}}>
<div className="anim" style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}><div><h2 style={{fontSize:20,fontWeight:800}}>Mitglieder</h2><p style={{fontSize:11,color:"rgba(255,255,255,.25)",fontWeight:300,marginTop:2}}>{filtered.length} von {memberList.length} Mitglieder</p></div><button onClick={openCreate} className="ag aglow" style={{width:34,height:34,borderRadius:10,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="plus" s={15} c="#06080f"/></button></div>
<div className="anim d1" style={{display:"flex",gap:4,overflowX:"auto",paddingBottom:8,marginBottom:10}}>
<button onClick={()=>setTeamFilter("alle")} style={{padding:"6px 12px",borderRadius:8,fontSize:9,fontWeight:700,whiteSpace:"nowrap",flexShrink:0,cursor:"pointer",background:teamFilter==="alle"?"rgba(var(--c2r),.12)":"rgba(255,255,255,.03)",border:teamFilter==="alle"?"1px solid rgba(var(--c2r),.3)":"1px solid rgba(255,255,255,.06)",color:teamFilter==="alle"?"var(--c2)":"rgba(255,255,255,.25)",transition:"all .12s"}}>Alle</button>
{teams.map(t=><button key={t.id} onClick={()=>setTeamFilter(t.id)} style={{padding:"6px 12px",borderRadius:8,fontSize:9,fontWeight:700,whiteSpace:"nowrap",flexShrink:0,cursor:"pointer",display:"flex",alignItems:"center",gap:4,background:teamFilter===t.id?`${t.color}18`:"rgba(255,255,255,.03)",border:teamFilter===t.id?`1px solid ${t.color}40`:"1px solid rgba(255,255,255,.06)",color:teamFilter===t.id?t.color:"rgba(255,255,255,.25)",transition:"all .12s"}}><span style={{width:6,height:6,borderRadius:3,background:t.color,flexShrink:0}}/>{t.name}</button>)}
</div>
<input placeholder="Suchen..." value={search} onChange={e=>setSearch(e.target.value)} style={{marginBottom:14}} className="anim d1"/>
<div style={{display:"flex",flexDirection:"column",gap:6}}>{filtered.map((m,i)=>{const mTeam=m.teamId?teams.find(t=>t.id===m.teamId):null;return<div key={m.id} className={`glass card anim d${Math.min(i+1,5)}`} style={{display:"flex",alignItems:"center",gap:10,padding:10}}>
<Av name={m.n} size={34}/>
<div style={{flex:1,minWidth:0}}>
<div style={{fontSize:13,color:"rgba(255,255,255,.75)",fontWeight:500}}>{m.n}</div>
<div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}>
<Bdg type={m.rl.includes("Trainer")?"turnier":m.rl.includes("Eltern")?"helfer":"training"}>{m.rl}</Bdg>

</div>
