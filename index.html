<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#06080f">
<title>Sporti – Dein Sportverein. Deine App.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
*{font-family:'Outfit',sans-serif}
html,body,#root{height:100%;background:#06080f;color:#fff;overflow-x:hidden}
::-webkit-scrollbar{width:0;display:none}

/* Animations */
@keyframes aurora{0%,100%{transform:translate(0,0) rotate(0) scale(1)}25%{transform:translate(30px,-20px) rotate(5deg) scale(1.1)}50%{transform:translate(-20px,20px) rotate(-5deg) scale(.95)}75%{transform:translate(10px,10px) rotate(3deg) scale(1.05)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes pulse-ring{0%{transform:scale(.95);opacity:.7}50%{transform:scale(1.05);opacity:1}100%{transform:scale(.95);opacity:.7}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{opacity:.4}50%{opacity:.8}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.anim{animation:slideUp .5s ease-out both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}.d7{animation-delay:.35s}.d8{animation-delay:.4s}

/* Glass */
.glass{background:rgba(255,255,255,.03);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.06);transition:all .2s}
.glass:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1)}
.glass-s{background:rgba(255,255,255,.06);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.1)}

/* Gradients */
.gt{background:linear-gradient(135deg,#a3f7bf 0%,#00d4ff 50%,#7c5cfc 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gt-w{background:linear-gradient(135deg,#ffd700 0%,#ff6b35 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ag{background:linear-gradient(135deg,#a3f7bf 0%,#00d4ff 50%,#7c5cfc 100%)}
.aglow{box-shadow:0 0 30px rgba(0,212,255,.15),0 0 60px rgba(163,247,191,.08)}
.cglow{transition:all .2s}.cglow:hover{box-shadow:0 8px 32px rgba(0,212,255,.08)}
.dot-grid{background-image:radial-gradient(rgba(255,255,255,.03) 1px,transparent 1px);background-size:24px 24px}

/* Inputs */
input,select,textarea{font-family:'Outfit',sans-serif;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:14px 16px;color:#fff;font-size:14px;outline:none;transition:border-color .2s;width:100%}
input::placeholder{color:rgba(255,255,255,.12)}
input:focus,select:focus{border-color:rgba(0,212,255,.3)}
select{appearance:none;color:rgba(255,255,255,.5)}

/* Buttons */
.btn-primary{width:100%;padding:16px;border-radius:16px;font-weight:700;font-size:14px;color:#06080f;border:none;cursor:pointer;transition:all .15s;letter-spacing:.02em}
.btn-primary:hover{transform:scale(1.02)}.btn-primary:active{transform:scale(.98)}

/* Layout */
.app-shell{min-height:100vh;display:flex;justify-content:center;position:relative}
.app-frame{width:100%;max-width:480px;min-height:100vh;position:relative;z-index:10}
.app-content{padding:0 20px 110px}

/* Aurora BG */
.aurora-orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0}

/* Bottom Nav */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;justify-content:center}
.nav-inner{width:100%;max-width:480px;display:flex;justify-content:space-around;padding:10px 0;background:rgba(255,255,255,.06);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-top:1px solid rgba(255,255,255,.04)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 12px;background:none;border:none;cursor:pointer;position:relative;transition:all .2s}
.nav-btn svg{transition:all .2s}
.nav-label{font-size:9px;font-weight:700;letter-spacing:.05em}
.nav-dot{position:absolute;top:-4px;width:24px;height:2px;border-radius:2px;animation:glow 2s ease-in-out infinite}

/* Badge */
.badge{padding:4px 10px;border-radius:8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;display:inline-flex;align-items:center;gap:4px}

/* Ring */
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
.ring-content{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}

/* Card styles */
.card{border-radius:16px;padding:16px;transition:all .2s}
.card-lg{border-radius:24px;padding:20px}

/* Util */
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.justify-center{justify-content:center}
.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.gap-5{gap:20px}
.flex-1{flex:1}.shrink-0{flex-shrink:0}.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.w-full{width:100%}.text-center{text-center}.text-right{text-align:right}.min-w-0{min-width:0}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mt-5{margin-top:20px}.mt-6{margin-top:24px}
.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.mb-5{margin-bottom:20px}.mb-6{margin-bottom:24px}
.ml-3{margin-left:12px}
.space-y-2>*+*{margin-top:8px}.space-y-3>*+*{margin-top:12px}.space-y-5>*+*{margin-top:20px}
.overflow-x-auto{overflow-x:auto}.whitespace-nowrap{white-space:nowrap}
.cursor-pointer{cursor:pointer}.relative{position:relative}.absolute{position:absolute}
.hidden{display:none}
.mono{font-family:'JetBrains Mono',monospace}

/* Text */
.text-xs{font-size:11px}.text-xxs{font-size:10px}.text-xxxs{font-size:9px}
.text-sm{font-size:14px}.text-base{font-size:16px}.text-lg{font-size:18px}.text-xl{font-size:20px}.text-2xl{font-size:24px}.text-3xl{font-size:30px}.text-4xl{font-size:36px}
.font-light{font-weight:300}.font-medium{font-weight:500}.font-semibold{font-weight:600}.font-bold{font-weight:700}.font-black{font-weight:900}
.tracking-tight{letter-spacing:-.02em}.tracking-wide{letter-spacing:.05em}.tracking-wider{letter-spacing:.1em}.tracking-widest{letter-spacing:.2em}
.uppercase{text-transform:uppercase}
.leading-relaxed{line-height:1.6}

/* Colors */
.c-10{color:rgba(255,255,255,.1)}.c-15{color:rgba(255,255,255,.15)}.c-20{color:rgba(255,255,255,.2)}.c-25{color:rgba(255,255,255,.25)}.c-30{color:rgba(255,255,255,.3)}.c-40{color:rgba(255,255,255,.4)}.c-50{color:rgba(255,255,255,.5)}.c-60{color:rgba(255,255,255,.6)}.c-70{color:rgba(255,255,255,.7)}.c-75{color:rgba(255,255,255,.75)}.c-80{color:rgba(255,255,255,.8)}
.c-mint{color:#a3f7bf}.c-cyan{color:#00d4ff}.c-violet{color:#b794fc}.c-gold{color:#ffd700}.c-orange{color:#ff6b35}.c-green{color:#4ade80}.c-red{color:#fb7185}

/* Screen transitions */
.screen{animation:fadeIn .3s ease-out}
</style>
</head>

// ─── SVG Icon ───────────────────────────────────────────────
const paths = {home:"M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1",calendar:"M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z",trophy:"M12 15l-2 5h4l-2-5zm0 0a6 6 0 006-6V4H6v5a6 6 0 006 6zM6 4H3v3a3 3 0 003 3m12-6h3v3a3 3 0 01-3 3",users:"M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z",chat:"M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z",settings:"M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.573-1.066z",check:"M5 13l4 4L19 7",x:"M6 18L18 6M6 6l12 12",star:"M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z",hand:"M7 11.5V14m0-2.5v-6a1.5 1.5 0 113 0m-3 6a1.5 1.5 0 00-3 0v2a7.5 7.5 0 0015 0v-5a1.5 1.5 0 00-3 0m-6-3V11m0-5.5v-1a1.5 1.5 0 013 0v1m0 0V11m0-5.5a1.5 1.5 0 013 0v3m0 0V11",money:"M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0 // ─── Components ─────────────────────────────────────────────
const Av = ({name,size=40,glow,ring}) => {

const Ring = ({val,max=100,size=80,sw=5,color="#00d4ff",children}) => {
  const r=(size-sw)/2, c=2*Math.PI*r, o=c-(val/max)*c;
  return <div className="ring-wrap" style={{width:size,height:size}}>
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>

  <p className="c-25 text-sm font-light mb-5 anim d1">Beiträge, Bussen & Zahlungen</p>
  <div className="glass-s card-lg mb-5 anim d2" style={{position:"relative",overflow:"hidden"}}><div style={{position:"absolute",top:0,right:0,width:160,height:160,borderRadius:"50%",opacity:.08,background:"radial-gradient(circle,#ff6b35,transparent 70%)",transform:"translate(30%,-30%)"}}/>
    <div className="c-25" style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".2em",marginBottom:4}}>Offener Betrag</div>
    <div className="gt-w" style={{fontSize:36,fontWeight:900}}>CHF 370.–</div>
  </div>
  <div className="space-y-2">{fins.map((f,i)=><div key={f.id} className={`glass card flex items-center justify-between cglow anim d${Math.min(i+2,5)}`}><div className="flex-1 min-w-0"><h4 className="text-sm c-70 font-medium truncate">{f.desc}</h4><div className="c-20 font-light mt-1" style={{fontSize:10}}>Fällig: {f.due}</div></div><div className="text-right ml-3"><div className="text-sm font-black c-70 mono">CHF {f.amt}.–</div><span className="font-bold uppercase" style={{fontSize:9,letterSpacing:".08em",color:f.st==="bezahlt"?"#4ade80":"#fb923c"}}>{f.st}</span></div></div>)}</div>
</div>;

// ─── ADMIN ──────────────────────────────────────────────────
const Admin = ({nav}) => {
  const stats = [{icon:"users",l:"Mitglieder",v:"127",s:"+12 Monat",c:"#a3f7bf"},{icon:"calendar",l:"Termine",v:"34",s:"Saison aktiv",c:"#ffd700"},{icon:"chart",l:"Ø Präsenz",v:"73%",s:"+5% vs. Vormonat",c:"#b794fc"},{icon:"zap",l:"Top Punkte",v:"234",s:"Mia Keller",c:"#00d4ff"}];
  const acts = [{icon:"users",l:"Mitglieder",d:"Rollen & Berechtigungen",to:"members"},{icon:"calendar",l:"Termine",d:"Erstellen & bearbeiten",to:"createEvent"},{icon:"star",l:"Punktesystem",d:"Punkte festlegen",to:"rankings"},{icon:"hand",l:"Helfereinsätze",d:"Erstellen & verwalten",to:"helpers"},{icon:"money",l:"Finanzen",d:"Beiträge & Bussen",to:"finances"},{icon:"shield",l:"Berechtigungen",d:"Wer darf was?"},{icon:"bell",l:"Benachrichtigungen",d:"Push & E-Mail"},{icon:"settings",l:"Einstellungen",d:"Verein, Logo, Saison"}];
  return <div className="screen" style={{paddingBottom:24}}>
    <h2 className="text-2xl font-black tracking-tight mb-1 anim">Admin Center</h2>
    <p className="c-25 text-sm font-light mb-5 anim d1">Vereinsverwaltung</p>
    <div className="grid-2 mb-6">{stats.map((s,i)=><div key={s.l} className={`glass card cglow anim d${i+1}`}><div className="flex items-center gap-2 mb-2"><div style={{width:32,height:32,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",background:`${s.c}12`}}><Ic n={s.icon} s={15} c={s.c}/></div><span className="c-25 font-bold uppercase" style={{fontSize:9,letterSpacing:".15em"}}>{s.l}</span></div><div className="text-2xl font-black">{s.v}</div><div className="c-20 font-light mt-1" style={{fontSize:10}}>{s.s}</div></div>)}</div>
    <h3 className="c-25 font-bold uppercase mb-3" style={{fontSize:11,letterSpacing:".2em"}}>Verwaltung</h3>
    <div className="space-y-2">{acts.map((a,i)=><div key={a.l} onClick={()=>a.to&&nav(a.to)} className={`glass card flex items-center gap-3 cursor-pointer cglow anim d${Math.min(i+1,5)}`}><div className="glass shrink-0" style={{width:40,height:40,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n={a.icon} s={17} c="rgba(255,255,255,.35)"/></div><div className="flex-1 min-w-0"><div className="text-sm c-70 font-medium">{a.l}</div><div className="c-20 font-light" style={{fontSize:10}}>{a.d}</div></div><span className="c-10 text-lg">›</span></div>)}</div>
  </div>;
};

// ─── MEMBERS ────────────────────────────────────────────────
const Members = () => <div className="screen" style={{paddingBottom:24}}>
  <div className="flex items-center justify-between mb-5 anim"><div><h2 className="text-2xl font-black tracking-tight">Mitglieder</h2><p className="c-25 text-sm font-light">{mems.length} Mitglieder</p></div><button className="ag aglow shrink-0" style={{width:44,height:44,borderRadius:12,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="plus" s={18} c="#06080f"/></button></div>
  <input placeholder="Suchen..." style={{marginBottom:16}} className="anim d1"/>
  <div className="space-y-2">{mems.map((m,i)=><div key={m.id} className={`glass card flex items-center gap-3 cglow anim d${Math.min(i+1,5)}`}><Av name={m.name} size={42}/><div className="flex-1 min-w-0"><div className="text-sm c-75 font-medium">{m.name}</div><div className="flex items-center gap-2 mt-1"><Bdg type={m.role.includes("Trainer")?"turnier":m.role.includes("Eltern")?"helfer":"training"}>{m.role}</Bdg>{m.team!=="–"&&<span className="c-20" style={{fontSize:9}}>{m.team}</span>}</div></div>{m.par&&<span className="c-15 font-light text-right" style={{fontSize:9,lineHeight:1.3}}>Eltern<br/><span className="c-25">{m.par}</span></span>}{m.child&&<span className="c-15 font-light text-right" style={{fontSize:9,lineHeight:1.3}}>Kind<br/><span className="c-25">{m.child}</span></span>}</div>)}</div>
</div>;

// ─── PROFILE ────────────────────────────────────────────────
const Profile = ({onBack}) => <div className="screen" style={{paddingBottom:24}}>
  <BackBtn onClick={onBack}/>
  <div className="flex flex-col items-center mb-6 anim" style={{textAlign:"center"}}>
    <div className="relative mb-4"><div className="ag aglow" style={{width:112,height:112,borderRadius:24,display:"flex",alignItems:"center",justifyContent:"center",animation:"pulse-ring 4s ease-in-out infinite"}}><span style={{fontSize:30,fontWeight:900,color:"#06080f"}}>LM</span></div><div className="glass-s" style={{position:"absolute",bottom:-4,right:-4,width:36,height:36,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>📷</div></div>
    <h2 className="text-2xl font-black tracking-tight">{U.name}</h2>
    <p className="c-30 text-sm font-light">{U.team} · {U.role}</p>
  </div>
  <div className="space-y-2 anim d1">{[{l:"E-Mail",v:"luca@example.ch"},{l:"Geburtsdatum",v:"15.06.2008"},{l:"Eltern-Account",v:"Thomas Meier (verknüpft)"},{l:"Mitglied seit",v:"August 2021"}].map(f=><div key={f.l} className="glass card"><div className="c-25 font-bold uppercase" style={{fontSize:10,letterSpacing:".15em",marginBottom:2}}>{f.l}</div><div className="text-sm c-70 font-medium">{f.v}</div></div>)}</div>
  <div className="mt-6 anim d2"><h3 className="c-25 font-bold uppercase mb-3" style={{fontSize:11,letterSpacing:".2em"}}>Abwesenheiten</h3><div style={{borderRadius:16,padding:16,background:"rgba(255,215,0,.05)",border:"1px solid rgba(255,215,0,.12)"}}><div className="flex items-center gap-2 mb-1"><Ic n="injury" s={14} c="#ffd700"/><span className="text-sm c-gold font-medium">Knöchelverletzung</span></div><div className="c-25 font-light" style={{fontSize:11}}>Rückkehr: ca. 15. April 2026</div></div></div>
  <button className="glass w-full mt-6 c-30 text-sm font-medium flex items-center justify-center gap-2" style={{padding:14,borderRadius:16,border:"1px solid rgba(255,255,255,.06)",background:"rgba(255,255,255,.03)",cursor:"pointer"}}><Ic n="logout" s={16}/> Abmelden</button>
</div>;

// ─── NAV ────────────────────────────────────────────────────
const Nav = ({active,nav,role}) => {
  const items = [{id:"dashboard",icon:"home",l:"Home"},{id:"events",icon:"calendar",l:"Termine"},{id:"rankings",icon:"trophy",l:"Ranking"},{id:"chat",icon:"chat",l:"Chat"}];
  items.push(role==="admin"||role==="vorstand"?{id:"admin",icon:"settings",l:"Admin"}:{id:"profile",icon:"profile",l:"Profil"});
  return <div className="nav"><div className="nav-inner">{items.map(it=>{const a=active===it.id;return<button key={it.id} onClick={()=>nav(it.id)} className="nav-btn">{a&&<div className="nav-dot ag"/>}<Ic n={it.icon} s={20} c={a?"#00d4ff":"rgba(255,255,255,.2)"}/><span className="nav-label" style={{color:a?"#00d4ff":"rgba(255,255,255,.2)"}}>{it.l}</span></button>})}</div></div>;
};

// ─── APP ────────────────────────────────────────────────────
const App = () => {
  const [scr,setScr] = useState("login");
  const [role,setRole] = useState("spieler");
  const [evD,setEvD] = useState(null);
  const [prev,setPrev] = useState("dashboard");

  const nav = (t,d) => {if(t==="eventDetail"){setEvD(d);setPrev(scr)}setScr(t);window.scrollTo?.(0,0)};

  if(scr==="login") return <Login onLogin={r=>{setRole(r);setScr("dashboard")}}/>;

  const S = {dashboard:<Dash role={role} nav={nav}/>,events:<Events nav={nav}/>,eventDetail:<EvDetail ev={evD} onBack={()=>setScr(prev)}/>,createEvent:<CreateEv onBack={()=>setScr("dashboard")}/>,rankings:<Rankings/>,chat:<Chat/>,helpers:<Helpers/>,finances:<Finances/>,admin:<Admin nav={nav}/>,members:<Members/>,profile:<Profile onBack={()=>setScr("dashboard")}/>};
  const mains = ["dashboard","events","rankings","chat","admin","profile"];

  return <div className="app-shell" style={{background:"#06080f"}}>
    <Aurora/>
    <div className="app-frame dot-grid">
      <div className="flex items-center justify-between" style={{padding:"12px 20px 4px"}}><span className="c-25 font-semibold mono" style={{fontSize:11}}>9:41</span><div style={{height:12,width:28,borderRadius:8,background:"rgba(255,255,255,.1)",position:"relative",overflow:"hidden"}}><div className="ag" style={{height:"100%",width:"80%",borderRadius:8}}/></div></div>
      <div className="flex items-center justify-between" style={{padding:"4px 20px 12px"}}>
        <div className="flex items-center gap-2"><div className="ag" style={{width:32,height:32,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:10,fontWeight:900,color:"#06080f"}}>S</span></div><span className="c-20 font-black uppercase" style={{fontSize:10,letterSpacing:".3em"}}>Sporti</span></div>
        <div className="flex items-center gap-2"><RBdg role={role}/><div className="glass cursor-pointer" style={{width:36,height:36,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}} onClick={()=>nav("profile")}><Ic n="bell" s={16} c="rgba(255,255,255,.3)"/><div style={{position:"absolute",top:8,right:8,width:8,height:8,borderRadius:4,background:"#ff6b35",animation:"glow 2s ease-in-out infinite"}}/></div></div>
      </div>
      <div className="app-content">{S[scr]||<Dash role={role} nav={nav}/>}</div>
      <Nav active={mains.includes(scr)?scr:prev} nav={nav} role={role}/>
    </div>
  </div>;
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
