const parseEvDate=(ev)=>{const mo={"Jan":0,"Feb":1,"Mär":2,"Mar":2,"Apr":3,"Mai":4,"Jun":5,"Jul":6,"Aug":7,"Sep":8,"Okt":9,"Nov":10,"Dez":11};const p=ev.date.split(", ")[1];if(!p)return new Date(2099,0);const[d,m]=p.split(". ");const h=parseInt(ev.time)||19;return new Date(2026,mo[m]||0,parseInt(d),h)};
const isWithin24h=(ev)=>(parseEvDate(ev)-new Date())<24*60*60*1000;

  {isStaff&&<div className="anim d2 section" onClick={()=>nav("stats")} style={{cursor:"pointer",borderRadius:16,padding:"12px 14px",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",justifyContent:"space-between",transition:"all .12s"}}>
    <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:32,height:32,borderRadius:10,background:"rgba(124,92,252,.1)",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="chart" s={15} c="#b794fc"/></div><div><span style={{fontSize:13,fontWeight:600,color:"rgba(255,255,255,.7)"}}>Statistiken</span><p style={{fontSize:9,color:"rgba(255,255,255,.2)",marginTop:1}}>Punkte, Präsenz, Leistung</p></div></div>
    <span style={{color:"rgba(255,255,255,.15)",fontSize:16}}>›</span>
  </div>}
  <div className="anim d3"><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}><h3 className="section-title" style={{marginBottom:0}}>Nächste Termine</h3><button style={{fontSize:10,color:"#00d4ff",fontWeight:600,background:"none",border:"none",cursor:"pointer"}} onClick={()=>nav("events")}>Alle →</button></div><div style={{display:"flex",flexDirection:"column",gap:8}}>{evts.slice(0,4).map((ev,i)=>{const st=statuses[ev.id];return<div key={ev.id} className={`glass card anim d${Math.min(i+2,5)}`} style={{cursor:"pointer"}}>

      <div style={{display:"flex",alignItems:"center",gap:8,fontSize:10,color:"rgba(255,255,255,.3)",fontWeight:300}}><span>{ev.date}</span><span style={{color:"rgba(255,255,255,.1)"}}>·</span><span>{ev.time}</span></div>
      <div style={{display:"flex",alignItems:"center",gap:6,marginTop:8}}><div style={{flex:1,height:3,background:"rgba(255,255,255,.04)",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",borderRadius:3,width:`${(ev.att/ev.max)*100}%`,background:`linear-gradient(90deg,${(TC[ev.type]||TC.training).c}80,${(TC[ev.type]||TC.training).c}25)`,transition:"width .6s"}}/></div><span className="mono" style={{fontSize:8,color:"rgba(255,255,255,.2)"}}>{ev.att}/{ev.max}</span></div>

      <button onClick={e=>handleAbsage(e,ev)} style={{flex:1,padding:"7px 0",borderRadius:8,fontSize:10,fontWeight:700,cursor:"pointer",border:"none",transition:"all .12s",background:st==="abgemeldet"?"rgba(239,68,68,.7)":"rgba(255,255,255,.04)",color:st==="abgemeldet"?"#fff":"rgba(255,255,255,.25)"}}>✗ Absage</button>
    </div>
  </div>})}</div></div>

  {absPopup&&<div style={{position:"fixed",inset:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setAbsPopup(null)}>

  {latePopup&&<div style={{position:"fixed",inset:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setLatePopup(null)}>
    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.6)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)"}}/>
    <div onClick={e=>e.stopPropagation()} style={{position:"relative",width:"100%",maxWidth:340,borderRadius:20,background:"rgba(13,16,23,.85)",backdropFilter:"blur(40px)",WebkitBackdropFilter:"blur(40px)",border:"1px solid rgba(255,107,53,.12)",padding:20,animation:"slideUp .25s ease-out",boxShadow:"0 20px 60px rgba(0,0,0,.4)"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}><div style={{width:32,height:32,borderRadius:10,background:"rgba(255,107,53,.1)",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="bell" s={16} c="#ff6b35"/></div><h3 style={{fontSize:16,fontWeight:800}}>Zu spät!</h3></div>
      <p style={{fontSize:13,color:"rgba(255,255,255,.55)",fontWeight:300,lineHeight:1.6,marginBottom:6}}>Absagen sind nur bis <strong style={{color:"#ff6b35",fontWeight:600}}>24 Stunden</strong> vor dem Termin möglich.</p>

const Events=({nav})=>{const[f,setF]=useState("alle");const types=["alle","training","spiel","turnier","helfer"];const fl=f==="alle"?evts:evts.filter(e=>e.type===f);return<div className="screen" style={{padding:`0 ${px}px 20px`}}><h2 className="anim" style={{fontSize:20,fontWeight:800,marginBottom:14}}>Termine</h2><div className="anim d1" style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:14}}>{types.map(t=><button key={t} onClick={()=>setF(t)} style={{padding:"8px 14px",borderRadius:10,fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".1em",whiteSpace:"nowrap",flexShrink:0,cursor:"pointer",background:f===t?(TC[t]?.c||"#00d4ff")+"18":"rgba(255,255,255,.03)",border:f===t?`1px solid ${(TC[t]?.c||"#00d4ff")}40`:"1px solid rgba(255,255,255,.06)",color:f===t?(TC[t]?.c||"#00d4ff"):"rgba(255,255,255,.25)",transition:"all .12s"}}>{t}</button>)}</div><div style={{display:"flex",flexDirection:"column",gap:8}}>{fl.map((ev,i)=><div key={ev.id} onClick={()=>nav("eventDetail",ev)} className={`glass card anim d${Math.min(i+1,5)}`} style={{cursor:"pointer"}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}><div><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}><Bdg type={ev.type}>{ev.type}</Bdg><span className="mono" style={{fontSize:9,color:"rgba(255,255,255,.2)"}}>+{ev.pts}</span></div><h4 style={{fontSize:13,fontWeight:600}}>{ev.title}</h4></div><SPill status={ev.status}/></div><div style={{fontSize:10,color:"rgba(255,255,255,.3)",fontWeight:300}}>{ev.date} · {ev.time}</div><div style={{fontSize:10,color:"rgba(255,255,255,.15)",fontWeight:300,marginTop:2}}>{ev.loc}</div></div>)}</div></div>};

tton onClick={()=>setSt("abgemeldet")} style={{padding:13,borderRadius:12,fontWeight:700,fontSize:13,cursor:"pointer",border:"none",background:st==="abgemeldet"?"rgba(239,68,68,.8)":"rgba(255,255,255,.03)",color:st==="abgemeldet"?"#fff":"rgba(255,255,255,.3)",transition:"all .12s"}}>✗ Abmelden</button></div><h3 className="section-title">Angemeldet</h3><div style={{display:"flex",flexDirection:"column",gap:6}}>{mems.filter(m=>m.rl.startsWith("Spieler")).slice(0,5).map((m,i)=><div key={i} className={`glass card anim d${Math.min(i+1,5)}`} style={{display:"flex",alignItems:"center",gap:10,padding:10}}><Av name={m.n} size={30}/><span style={{fontSize:13,color:"rgba(255,255,255,.7)",flex:1,fontWeight:500}}>{m.n}</span><Ic n="check" s={12} c="#a3f7bf"/></div>)}</div>

{it.id==="chat"&&chatBadge>0&&<div style={{position:"absolute",top:0,right:6,minWidth:16,height:16,borderRadius:8,background:"#ff6b35",display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px",animation:"pulse-ring 2s ease-in-out infinite"}}><span style={{fontSize:8,fontWeight:800,color:"#fff"}}>{chatBadge}</span></div>}
<span style={{fontSize:8,fontWeight:700,letterSpacing:".04em",color:a?"var(--c2)":"rgba(255,255,255,.2)"}}>{it.l}</span></button>})}</div></div>};

const App=()=>{const[scr,setScr]=useState("login");const[role,setRole]=useState("spieler");const[evD,setEvD]=useState(null);const[prev,setPrev]=useState("dashboard");const[showNews,setShowNews]=useState(false);const[trainerInbox,setTrainerInbox]=useState([]);const[chatBadge,setChatBadge]=useState(0);const[themeId,setThemeId]=useState(savedTheme);const th=useTheme(themeId);
